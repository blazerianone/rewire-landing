<VirtualHost *:80>
    ServerName lp.rewire.school

    DocumentRoot /home/solsafepayment/dev-2026/rewire-landing/pages

    <Directory /home/solsafepayment/dev-2026/rewire-landing/pages>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Serve shared assets at /shared/
    Alias /shared /home/solsafepayment/dev-2026/rewire-landing/shared
    <Directory /home/solsafepayment/dev-2026/rewire-landing/shared>
        Options -Indexes
        Require all granted
    </Directory>

    CustomLog /var/log/apache2/lp-rewire-school-access.log combined
    ErrorLog /var/log/apache2/lp-rewire-school-error.log

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =lp.rewire.school
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
